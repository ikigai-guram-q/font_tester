<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Bitmap Font Previewer</title>

  <style>
    body {
      margin: 0;
      background: #2d4557;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      height: 64px;
      background: white;
      color: black;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 14px;
    }

    .logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }

    .title {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .main {
      text-align: center;
      padding-top: 70px;
    }

    h2 {
      margin-bottom: 6px;
      font-size: 24px;
      font-weight: 800;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .info {
      display: inline-block;
      background: #e5f6ff;
      color: #06415f;
      padding: 16px 28px;
      border-radius: 4px;
      margin-bottom: 36px;
      font-size: 16px;
    }

    #dropZone {
      width: 520px;
      height: 250px;
      margin: 0 auto 28px auto;
      border: 2px dashed white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    textarea {
      width: 700px;
      height: 120px;
      font-size: 18px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 14px;
    }

    .controls {
      margin-bottom: 18px;
      font-size: 15px;
    }

    canvas {
      display: block;
      margin: 20px auto;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<header>
  <img class="logo" src="logo.png" />
  <div class="title">Font Previewer</div>
</header>

<div class="main">
  <h2>Import Bitmap Font files to preview</h2>
  <div class="subtitle">(.fnt, .png)</div>

  <div class="info">ⓘ Support bitmap font exported files</div>

  <div id="dropZone">
    Drag & drop files here or Click to select files
  </div>

  <textarea id="textInput">FREE SPINS
BIG WIN
1000</textarea>

  <div class="controls">
    Size:
    <input id="scaleSlider" type="range" min="0.2" max="3" step="0.05" value="1">
    <span id="scaleValue">1</span>

    Extra Spacing:
    <input id="spacingSlider" type="range" min="-30" max="60" value="0">
    <span id="spacingValue">0</span>

    Line Spacing:
    <input id="lineSlider" type="range" min="-50" max="150" value="0">
    <span id="lineValue">0</span>
  </div>
</div>

<script src="https://pixijs.download/v7.4.3/pixi.min.js"></script>

<!-- keep your existing JavaScript here -->

</body>
</html>
